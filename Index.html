<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal SIEL SSASUR v0.5</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon"> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { medical: { primary: '#0284c7', dark: '#0c4a6e', light: '#e0f2fe', critical: '#ef4444' } } } } }
  </script>
  <style>
    body { background: radial-gradient(circle at top right, #f1f5f9, #e0f2fe); min-height: 100vh; font-feature-settings: "cv02", "cv03", "cv04", "cv11"; }
    .glass { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 8px 32px 0 rgba(2, 132, 199, 0.05); }
    .glass-card { background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.6) 100%); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    .pulse-glow { animation: pulseGlow 2.5s infinite cubic-bezier(0.4, 0, 0.6, 1); }
    @keyframes pulseGlow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .8; transform: scale(1.02); } }
    
    /* Reglas para imprimir a PDF de forma limpia */
    .pdf-mode { background: white !important; }
  </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden selection:bg-medical-light selection:text-medical-dark">

  <div id="full-loader" class="fixed inset-0 z-[100] glass flex flex-col items-center justify-center transition-all duration-700">
    <div class="bg-gradient-to-br from-medical-primary to-medical-dark p-5 rounded-2xl shadow-2xl mb-6 pulse-glow">
      <i data-lucide="microscope" class="w-12 h-12 text-white"></i>
    </div>
    <h2 class="text-xl font-black text-medical-dark tracking-widest uppercase">Inicializando SIEL SSASUR...</h2>
  </div>

  <div id="login-view" class="fixed inset-0 z-[90] glass hidden flex flex-col items-center justify-center transition-all duration-500 opacity-0">
    <div class="bg-white/90 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white max-w-md w-full flex flex-col items-center">
      <div class="bg-medical-light text-medical-primary p-4 rounded-2xl mb-6 shadow-inner">
        <i data-lucide="shield-check" class="w-10 h-10"></i>
      </div>
      <h2 class="text-3xl font-black text-medical-dark mb-1 text-center leading-none">Credenciales de acceso</h2>
      <div class="w-full mb-4 mt-8">
        <input type="email" id="login-input-email" placeholder="Usuario" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-medical-primary outline-none">
      </div>
      <div class="w-full mb-8">
        <input type="password" id="login-input-pass" placeholder="Contraseña" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-medical-primary outline-none">
        <p id="login-error" class="text-xs text-red-500 font-bold mt-2 hidden text-center"></p>
      </div>
      <button onclick="intentarLogin()" class="w-full bg-medical-dark hover:bg-medical-primary text-white font-bold py-3.5 rounded-xl shadow-lg transition-all uppercase tracking-widest">Ingresar</button>
    </div>
  </div>

  <header id="main-header" class="glass sticky top-0 z-40 px-8 py-4 border-b border-white/40 hidden">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-6">
        <h1 class="text-2xl font-black text-medical-dark tracking-tighter flex items-center gap-2">
            <i data-lucide="activity" class="w-6 h-6 text-medical-primary"></i> SIEL <span class="font-light text-medical-primary">Red</span>
        </h1>
        <nav class="flex bg-slate-200/50 p-1 rounded-xl shadow-inner">
          <button id="tab-cat" onclick="nav('cat')" class="px-5 py-1.5 text-xs font-bold rounded-lg bg-white text-medical-primary shadow-sm flex items-center gap-1"><i data-lucide="book-open" class="w-4 h-4"></i> CATÁLOGO</button>
          <button id="tab-edt" onclick="nav('edt')" class="hidden px-5 py-1.5 text-xs font-bold rounded-lg text-slate-500 hover:text-medical-dark flex items-center gap-1"><i data-lucide="database" class="w-4 h-4"></i> MATRIZ</button>
        </nav>
      </div>
      <div class="flex items-center gap-6">
        <div class="relative w-80">
          <input type="text" id="search" oninput="applyFilters()" placeholder="Filtrar exámenes, LOINC o FONASA..." class="w-full glass-card border border-medical-primary/30 rounded-full py-2.5 pl-11 pr-4 focus:ring-2 focus:ring-medical-primary outline-none text-sm shadow-sm">
          <i data-lucide="search" class="w-4 h-4 absolute left-4 top-3 text-medical-primary opacity-60"></i>
        </div>
        <div class="flex items-center gap-4 pl-6 border-l border-slate-300">
          <div class="flex flex-col items-end">
            <span class="text-xs font-bold text-medical-dark" id="header-email">User</span>
            <span class="text-[9px] font-black text-medical-primary uppercase bg-medical-light px-2 rounded-full mt-0.5" id="header-role">Role</span>
          </div>
          <button onclick="cerrarSesion()" class="bg-white/80 p-2.5 rounded-full hover:bg-red-50 text-slate-500 hover:text-red-600 transition-all shadow-sm"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  </header>

  <div class="relative h-[calc(100vh-80px)]">
    <main id="view-cat" class="hidden h-full p-6 gap-6">
      <div class="w-1/3 flex flex-col gap-4">
        
        <div class="bg-medical-dark p-3 rounded-2xl shadow-md border border-medical-primary">
            <label class="text-[9px] text-blue-200 font-black uppercase tracking-widest mb-1 block pl-1 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> Sede Origen (Toma de Muestra)</label>
            <select id="filt-sede" onchange="applyFilters(); document.getElementById('detail-panel').classList.add('hidden');" class="w-full bg-white/10 text-white text-xs font-bold p-2 rounded-xl outline-none focus:ring-1 focus:ring-white border border-white/20">
                <option value="" class="text-slate-800">Seleccione un hospital...</option>
            </select>
        </div>

        <div class="flex gap-2 bg-white/50 p-2 rounded-xl shadow-sm border border-white">
            <select id="filt-area" onchange="applyFilters()" class="w-1/3 bg-transparent text-[10px] font-bold text-slate-600 outline-none"><option value="">Todas las áreas</option></select>
            <select id="filt-muestra" onchange="applyFilters()" class="w-1/3 bg-transparent text-[10px] font-bold text-slate-600 outline-none border-l border-slate-300 pl-2"><option value="">Tipo de muestra</option></select>
            <select id="filt-cont" onchange="applyFilters()" class="w-1/3 bg-transparent text-[10px] font-bold text-slate-600 outline-none border-l border-slate-300 pl-2"><option value="">Tipo de contenedor</option></select>
        </div>
        <div class="flex flex-col gap-3 overflow-y-auto custom-scroll pr-2 pb-20" id="exam-list"></div>
      </div>
      
      <div id="detail-panel" class="w-2/3 glass rounded-3xl p-8 overflow-y-auto custom-scroll hidden bg-white/40 shadow-xl relative border border-white"></div>
    </main>

    <main id="view-edt" class="hidden h-full p-6 flex flex-col gap-4">
      <div class="flex justify-between items-center glass p-4 rounded-2xl border border-medical-primary/20">
        <p class="text-sm font-medium text-slate-600 uppercase tracking-wider flex items-center gap-2"><i data-lucide="settings-2" class="w-4 h-4"></i> Edición Maestra (BD_SIEL)</p>
        <button onclick="saveChanges()" class="save-btn bg-medical-primary hover:bg-medical-dark text-white px-8 py-2 rounded-xl font-bold text-sm opacity-50 cursor-not-allowed transition-all">Sincronizar a Sheets</button>
      </div>
      <div class="glass flex-grow rounded-2xl overflow-auto custom-scroll border border-slate-200">
        <table class="w-full text-left text-xs border-collapse">
          <thead class="bg-white/95 sticky top-0 border-b border-slate-300 z-10 shadow-sm">
            <tr><th class="p-4 text-medical-dark font-black uppercase">ID SIEL</th><th class="p-4 text-medical-dark font-black uppercase">EXAMEN</th><th class="p-4 text-medical-dark font-black uppercase">UTILIDAD CLÍNICA</th><th class="p-4 text-medical-dark font-black uppercase">VALORES REF.</th></tr>
          </thead>
          <tbody id="editor-table-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    let db = { examenes: [], red: [] }, changes = {}, user = { email: '', role: '' };
    let currentEditId = null;

    // Inicializar Lucide Icons
    window.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });

    // Función Segura para leer columnas (ignora espacios)
    function getSafeField(obj, exactKey) {
       if(!obj) return '';
       if(obj[exactKey] !== undefined && obj[exactKey] !== '') return obj[exactKey];
       const target = exactKey.trim().toLowerCase();
       for(let k in obj) { if(k.trim().toLowerCase() === target || k.trim().toLowerCase().includes(target)) return obj[k]; }
       return '';
    }

    // Parser Inteligente de Condiciones Preanalíticas
    function parsearCondiciones(texto) {
      if (!texto || texto.toUpperCase() === 'SIN INFORMACION') {
          return {
              paciente: 'No requiere preparación especial. Ayuno estándar sugerido.',
              conservacion: 'Conservar según estándar de la red.',
              transporte: 'Temperatura ambiente. Enviar antes de 2 horas.'
          };
      }
      let prep = texto, cons = 'Ver información principal.', trans = 'Ver información principal.';
      if (texto.includes('1.') || texto.includes('2.') || texto.toUpperCase().includes('CONSERVACION')) {
          try {
              let partes1 = texto.split(/(?:2\.\s*CONSERVACION:|2\.\s*CONSERVACIÓN:|2\.)/i);
              prep = partes1[0].replace(/(?:1\.\s*PREPARACION DEL PACIENTE:|1\.\s*PREPARACIÓN DEL PACIENTE:|1\.)/i, '').trim();
              if (partes1.length > 1) {
                  let partes2 = partes1[1].split(/(?:3\.\s*TRANSPORTE:|3\.)/i);
                  cons = partes2[0].trim();
                  if (partes2.length > 1) trans = partes2[1].trim();
              }
          } catch(e) {}
      }
      return { paciente: prep, conservacion: cons, transporte: trans };
    }

    // Exportación a PDF
    function exportarPDF() {
        const element = document.getElementById('detail-panel');
        const opt = {
            margin:       10,
            filename:     `Ficha_Examen_SIEL_${currentEditId || 'Doc'}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        element.classList.add('pdf-mode'); // Elimina transparencia
        html2pdf().set(opt).from(element).save().then(() => {
            element.classList.remove('pdf-mode'); // Restaura estilo
        });
    }

    // Carga Inicial
    window.onload = () => {
      google.script.run.withSuccessHandler(res => {
        const payload = JSON.parse(res);
        db.examenes = payload.examenes;
        db.red = payload.red;
        document.getElementById('full-loader').classList.add('hidden');
        document.getElementById('login-view').classList.remove('hidden');
        setTimeout(() => document.getElementById('login-view').classList.remove('opacity-0'), 50);
      }).getInitData();
    };

    function intentarLogin() {
      const email = document.getElementById('login-input-email').value;
      const pass = document.getElementById('login-input-pass').value;
      google.script.run.withSuccessHandler(res => {
        if (res.success) { user = { email: email, role: res.role }; entrarAlPortal(); } 
        else { document.getElementById('login-error').innerText = res.msg; document.getElementById('login-error').classList.remove('hidden'); }
      }).verificarLogin(email, pass);
    }

    function entrarAlPortal() {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('main-header').classList.remove('hidden');
      document.getElementById('header-email').innerText = user.email.split('@')[0];
      document.getElementById('header-role').innerText = user.role;
      if(user.role === "ADMIN") document.getElementById('tab-edt').classList.remove('hidden');
      populateFilters(); applyFilters(); nav('cat');
    }

    function cerrarSesion() { location.reload(); }

    function nav(t) {
      document.getElementById('view-cat').classList.add('hidden');
      document.getElementById('view-edt').classList.add('hidden');
      document.getElementById(`view-${t}`).classList.remove('hidden');
      document.getElementById('tab-cat').className = t === 'cat' ? "px-5 py-1.5 text-xs font-bold rounded-lg bg-white text-medical-primary shadow-sm flex items-center gap-1" : "px-5 py-1.5 text-xs font-bold rounded-lg text-slate-500 flex items-center gap-1";
      document.getElementById('tab-edt').className = t === 'edt' ? "px-5 py-1.5 text-xs font-bold rounded-lg bg-white text-medical-primary shadow-sm flex items-center gap-1" : "px-5 py-1.5 text-xs font-bold rounded-lg text-slate-500 flex items-center gap-1";
      if(t === 'cat') document.getElementById('view-cat').classList.add('flex');
    }

    function populateFilters() {
      const getUnique = (arr, key) => [...new Set(arr.map(x => getSafeField(x, key)).filter(x => x && x.trim() !== ''))].sort();
      
      getUnique(db.examenes, 'Area de trabajo').forEach(v => document.getElementById('filt-area').innerHTML += `<option value="${v}">${v}</option>`);
      getUnique(db.examenes, 'Tipo muestra').forEach(v => document.getElementById('filt-muestra').innerHTML += `<option value="${v}">${v}</option>`);
      getUnique(db.examenes, 'Contenedor').forEach(v => document.getElementById('filt-cont').innerHTML += `<option value="${v}">${v}</option>`);
      
      const selectSede = document.getElementById('filt-sede');
      getUnique(db.red, 'Hospital').forEach(v => {
          const opt = document.createElement('option');
          opt.value = v; opt.innerText = v; opt.className = "text-slate-800";
          selectSede.appendChild(opt);
      });
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      const a = document.getElementById('filt-area').value;
      const m = document.getElementById('filt-muestra').value;
      const c = document.getElementById('filt-cont').value;
      
      const res = db.examenes.filter(ex => {
        const nom = getSafeField(ex, 'Nombre exámen SIEL').toLowerCase();
        const num = getSafeField(ex, 'Número').toLowerCase();
        const loinc = getSafeField(ex, 'Código LOINC').toLowerCase();
        const fonasa = getSafeField(ex, 'Código FONASA').toLowerCase();
        const area = getSafeField(ex, 'Area de trabajo');
        const mues = getSafeField(ex, 'Tipo muestra');
        const cont = getSafeField(ex, 'Contenedor');
        
        return (nom.includes(q) || num.includes(q) || loinc.includes(q) || fonasa.includes(q)) && (!a || area === a) && (!m || mues === m) && (!c || cont === c);
      });
      renderCatalog(res); 
      if(user.role === "ADMIN") renderEditor(res);
    }

    function renderCatalog(items) {
      const c = document.getElementById('exam-list'); c.innerHTML = '';
      items.slice(0, 150).forEach(ex => {
        const nombre = getSafeField(ex, 'Nombre exámen SIEL') || 'S/N';
        const num = getSafeField(ex, 'Número');
        const urg = getSafeField(ex, 'Tiempo respuesta urgencia');
        const isUrg = urg && urg.toLowerCase().includes('hora');
        
        const d = document.createElement('div');
        d.className = `glass-card p-4 rounded-2xl cursor-pointer hover:shadow-md transition-all border-l-4 ${isUrg ? 'border-l-red-400' : 'border-l-medical-primary'}`;
        d.innerHTML = `<div class="text-[9px] font-black text-medical-primary mb-1 uppercase tracking-widest flex items-center justify-between"><span>${num}</span> ${isUrg ? '<i data-lucide="flame" class="w-3 h-3 text-red-500"></i>' : ''}</div><div class="text-sm font-bold text-slate-800 leading-tight">${nombre}</div>`;
        d.onclick = () => showDetail(ex, nombre, num); 
        c.appendChild(d);
      });
      lucide.createIcons();
    }

    function showDetail(ex, nombre, id) {
        const p = document.getElementById('detail-panel');
        p.classList.remove('hidden');
        currentEditId = id;

        const cond = parsearCondiciones(getSafeField(ex, 'Condiciones del paciente'));
        const tAmb = getSafeField(ex, 'Tiempo respuesta ambulatorio') || 'N/A';
        const tUrg = getSafeField(ex, 'Tiempo respuesta urgencia') || 'N/A';
        const esUrgente = tUrg.toLowerCase().includes('hora');
        
        // Logística de Red
        const sede = document.getElementById('filt-sede').value;
        let htmlDerivacion = '';
        if (sede) {
            const regla = db.red.find(r => getSafeField(r, 'Número') == id && getSafeField(r, 'Hospital') == sede);
            if (regla) {
                const procesaEn = getSafeField(regla, 'DERIVA / PROCESA');
                const cartera = getSafeField(regla, 'Cartera');
                if (cartera.toUpperCase() === 'NO') {
                    htmlDerivacion = `<div class="bg-red-50 p-4 rounded-xl border border-red-200 text-red-700 text-xs font-black uppercase tracking-widest text-center shadow-sm mb-6 flex items-center justify-center gap-2 animate-pulse"><i data-lucide="alert-triangle" class="w-4 h-4"></i> EXAMEN NO INCLUIDO EN CARTERA DE ${sede}</div>`;
                } else if (procesaEn && procesaEn.toUpperCase() !== sede.toUpperCase() && procesaEn.toUpperCase() !== 'LOCAL') {
                    htmlDerivacion = `
                      <div class="bg-slate-800 p-5 rounded-2xl shadow-xl mb-6 text-white border border-slate-700 relative overflow-hidden">
                          <i data-lucide="truck" class="w-32 h-32 absolute -right-4 -top-4 opacity-5"></i>
                          <h4 class="text-[10px] font-black text-blue-300 uppercase tracking-widest mb-4 border-b border-slate-600 pb-2 flex items-center gap-2 relative z-10"><i data-lucide="share-2" class="w-4 h-4"></i> Ruta logística de derivación</h4>
                          <div class="flex items-center justify-between gap-4 relative z-10">
                              <div class="flex flex-col items-center flex-1">
                                  <div class="w-10 h-10 rounded-full bg-medical-primary flex items-center justify-center font-black text-xs shadow-inner">${sede.substring(0,4)}</div>
                                  <span class="text-[9px] mt-2 font-medium opacity-90 uppercase text-center">LAB ORIGEN<br><span class="text-white text-[10px] font-black">${sede}</span></span>
                              </div>
                              <div class="flex flex-col items-center flex-1">
                                  <div class="h-0.5 w-full bg-blue-500/50 relative rounded"><div class="absolute right-0 -top-1.5 text-blue-400 text-xs">▶</div></div>
                                  <span class="text-[9px] font-black text-blue-400 uppercase mt-1">Transporte</span>
                              </div>
                              <div class="flex flex-col items-center flex-1">
                                  <div class="w-10 h-10 rounded-full bg-amber-500 flex items-center justify-center font-black text-xs text-slate-900 shadow-inner">${procesaEn.substring(0,4)}</div>
                                  <span class="text-[9px] mt-2 font-medium opacity-90 uppercase text-center">LAB Procesamiento<br><span class="text-amber-400 text-[10px] font-black">${procesaEn}</span></span>
                              </div>
                          </div>
                      </div>`;
                } else {
                    htmlDerivacion = `<div class="bg-emerald-50/80 p-4 rounded-xl shadow-sm mb-6 text-emerald-800 border border-emerald-200 flex items-center justify-center gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500"></i><span class="text-[10px] font-black uppercase tracking-widest">Procesamiento Local en ${sede}</span></div>`;
                }
            } else {
                htmlDerivacion = `<div class="bg-slate-100 p-4 rounded-xl border border-slate-200 text-slate-500 text-[10px] font-black uppercase tracking-widest text-center shadow-sm mb-6">No hay regla logística definida para ${sede}</div>`;
            }
        }

        p.innerHTML = `
            <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-200/50">
                <div class="w-3/4">
                    <h2 class="text-3xl font-black text-medical-dark leading-none tracking-tight">${nombre}</h2>
                    <div class="flex gap-2 mt-3">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-medical-light text-medical-primary uppercase">ID: ${id}</span>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-100 text-slate-500 uppercase">${getSafeField(ex, 'Area de trabajo')}</span>
                    </div>
                </div>
                <button onclick="exportarPDF()" class="flex items-center gap-2 bg-medical-primary hover:bg-medical-dark text-white px-4 py-2.5 rounded-xl text-xs font-bold transition-all shadow-lg shadow-blue-200 shrink-0">
                    <i data-lucide="printer" class="w-4 h-4"></i> EXPORTAR PDF
                </button>
            </div>

            ${htmlDerivacion}

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="glass-card p-4 rounded-2xl border border-blue-100">
                    <div class="flex items-center gap-2 mb-2 text-medical-primary">
                        <i data-lucide="barcode" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Código FONASA</span>
                    </div>
                    <div class="text-lg font-black text-slate-800 tabular-nums">${getSafeField(ex, 'Código FONASA') || 'S/C'}</div>
                    <p class="text-[10px] font-medium text-slate-500 leading-tight mt-1 uppercase">${getSafeField(ex, 'Nombre FONASA') || 'Sin descripción'}</p>
                </div>
                <div class="glass-card p-4 rounded-2xl border border-emerald-100">
                    <div class="flex items-center gap-2 mb-2 text-emerald-600">
                        <i data-lucide="globe-2" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Código LOINC</span>
                    </div>
                    <div class="text-lg font-black text-slate-800 tabular-nums">${getSafeField(ex, 'Código LOINC') || 'S/C'}</div>
                    <p class="text-[10px] font-medium text-slate-500 leading-tight mt-1 italic">${getSafeField(ex, 'Nombre LOINC') || 'Sin descripción'}</p>
                </div>
            </div>

            <div class="bg-white/80 p-5 rounded-2xl border border-white shadow-sm mb-6">
                <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i data-lucide="flask-conical" class="w-4 h-4 text-medical-primary"></i> Requisitos de Muestra
                </h3>
                <div class="grid grid-cols-4 gap-4">
                    <div><span class="block text-[9px] uppercase text-slate-400 font-bold mb-1">Muestra</span><span class="text-xs font-bold text-slate-700">${getSafeField(ex, 'Tipo muestra')}</span></div>
                    <div><span class="block text-[9px] uppercase text-slate-400 font-bold mb-1">Contenedor</span><span class="text-xs font-bold text-slate-700">${getSafeField(ex, 'Contenedor')}</span></div>
                    <div><span class="block text-[9px] uppercase text-slate-400 font-bold mb-1">Vol. Adulto</span><span class="text-xs font-black text-medical-primary">${getSafeField(ex, 'Volumen muestra adulto') || 'Tubo Completo'}</span></div>
                    <div><span class="block text-[9px] uppercase text-slate-400 font-bold mb-1">Vol. Pediátrico</span><span class="text-xs font-black text-pink-600">${getSafeField(ex, 'Volumen muestra pediatrica') || '0.5 - 1 mL'}</span></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="p-4 rounded-2xl border ${esUrgente ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-200'}">
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] font-black ${esUrgente ? 'text-red-600' : 'text-slate-500'} uppercase">TAT Urgencia</span>
                        <i data-lucide="flame" class="w-4 h-4 ${esUrgente ? 'text-red-500 animate-pulse' : 'text-slate-400'}"></i>
                    </div>
                    <div class="text-xl font-black ${esUrgente ? 'text-red-700' : 'text-slate-800'} mt-1">${tUrg}</div>
                </div>
                <div class="p-4 rounded-2xl border bg-blue-50 border-blue-200">
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] font-black text-blue-600 uppercase">TAT Ambulatorio</span>
                        <i data-lucide="clock" class="w-4 h-4 text-blue-500"></i>
                    </div>
                    <div class="text-xl font-black text-blue-800 mt-1">${tAmb}</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="p-4 bg-white/40 rounded-xl border border-white">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase mb-2">Utilidad Clínica</h4>
                    <p class="text-xs text-slate-600 leading-relaxed">${getSafeField(ex, 'Utilidad clinica') || 'Consulta manual médico.'}</p>
                </div>
                <div class="p-4 bg-white/40 rounded-xl border border-white">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase mb-2">Valores Referencia</h4>
                    <p class="text-xs font-bold text-medical-dark leading-relaxed">${getSafeField(ex, 'Valores referencia') || 'Ver informe final.'}</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="p-4 bg-white/60 rounded-xl border-l-4 border-l-blue-400 shadow-sm">
                    <span class="text-[9px] font-black text-blue-500 uppercase mb-2 flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i> Preparación</span>
                    <p class="text-[10px] font-medium text-slate-600">${cond.paciente}</p>
                </div>
                <div class="p-4 bg-white/60 rounded-xl border-l-4 border-l-emerald-400 shadow-sm">
                    <span class="text-[9px] font-black text-emerald-500 uppercase mb-2 flex items-center gap-1"><i data-lucide="thermometer-snowflake" class="w-3 h-3"></i> Conservación</span>
                    <p class="text-[10px] font-medium text-slate-600">${cond.conservacion}</p>
                </div>
                <div class="p-4 bg-white/60 rounded-xl border-l-4 border-l-amber-400 shadow-sm">
                    <span class="text-[9px] font-black text-amber-500 uppercase mb-2 flex items-center gap-1"><i data-lucide="package" class="w-3 h-3"></i> Transporte</span>
                    <p class="text-[10px] font-medium text-slate-600">${cond.transporte}</p>
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    function renderEditor(items) {
      const b = document.getElementById('editor-table-body'); b.innerHTML = '';
      items.slice(0, 50).forEach(ex => {
        const id = getSafeField(ex, 'Número');
        if(!id) return;
        const r = document.createElement('tr');
        r.className = `hover:bg-medical-light/30 border-b border-slate-200 transition-all`;
        r.innerHTML = `
            <td class="p-4 font-bold text-slate-500">${id}</td>
            <td class="p-4 font-bold text-medical-dark text-sm">${getSafeField(ex, 'Nombre exámen SIEL')}</td>
            <td class="p-4"><textarea onchange="markChange('${id}', 'Utilidad clinica', this.value)" class="w-full bg-white border border-slate-200 rounded p-2 text-[10px] outline-none h-12">${getSafeField(ex, 'Utilidad clinica')}</textarea></td>
            <td class="p-4"><textarea onchange="markChange('${id}', 'Valores referencia', this.value)" class="w-full bg-white border border-slate-200 rounded p-2 text-[10px] outline-none h-12">${getSafeField(ex, 'Valores referencia')}</textarea></td>
        `;
        b.appendChild(r);
      });
    }

    function markChange(id, field, value) {
      if(!changes[id]) changes[id] = {'Número': id};
      changes[id][field] = value;
      const btns = document.querySelectorAll('.save-btn');
      btns.forEach(btn => { btn.classList.remove('opacity-50', 'cursor-not-allowed'); btn.classList.add('bg-amber-500'); btn.innerText = "Guardar cambios"; });
    }

    function saveChanges() {
      const datos = Object.values(changes);
      google.script.run.withSuccessHandler(() => location.reload()).guardarEdicionMasiva(datos);
    }
  </script>
</body>
</html>
